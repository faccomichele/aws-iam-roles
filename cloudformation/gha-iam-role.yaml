AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions IAM Role - Template for deploying repository-specific GitHub Actions roles that assume the shared OIDC provider'

# Stack Name: aws-iam-roles-${Environment}
# Deploy this stack once for account/environment combination

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Repository Configuration
        Parameters:
          - Organization
          - OwnerId
          - RepositoryName
          - RepositoryId
          - Environment
          - AccountAlias
    ParameterLabels:
      Organization:
        default: GitHub Organization
      OwnerId:
        default: GitHub Owner ID
      RepositoryName:
        default: Repository Name
      RepositoryId:
        default: Repository ID
      Environment:
        default: Environment
      AccountAlias:
        default: Account Alias
Parameters:
  Organization:
    Type: String
    Description: GitHub organization name
    Default: faccomichele
    MinLength: 1
    MaxLength: 63
    AllowedPattern: ^[a-z0-9-]+$
    ConstraintDescription: Must be lowercase alphanumeric with hyphens only
  
  OwnerId:
    Type: String
    Description: GitHub owner ID (numeric)
    Default: 12345678
    MinLength: 1
    MaxLength: 10
    AllowedPattern: ^[0-9-]+$
    ConstraintDescription: Must be a valid GitHub owner ID (numeric)

  RepositoryName:
    Type: String
    Description: Name of the GitHub repository (change this when copying to another repo)
    Default: aws-iam-roles
    MinLength: 1
    MaxLength: 100
    AllowedPattern: ^[a-zA-Z0-9._-]+$
    ConstraintDescription: Must be a valid GitHub repository name
  
  RepositoryId:
    Type: String
    Description: GitHub repository ID (numeric)
    Default: 12345678
    MinLength: 1
    MaxLength: 10
    AllowedPattern: ^[0-9-]+$
    ConstraintDescription: Must be a valid GitHub repository ID (numeric)

  Environment:
    Type: String
    Description: Environment/Workspace (dev, stg, prod)
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

  AccountAlias:
    Type: String
    Description: AWS account alias (used for tagging)
    Default: master

# Mapping from lower to upper as CFT does not have intrinsic functions for string case conversion
Mappings:
  EnvironmentMap:
    dev:
      Upper: DEV
    stg:
      Upper: STG
    prod:
      Upper: PROD

Resources:
  # IAM role for GitHub Actions (repository-specific)
  GHARole:
    Type: AWS::IAM::Role
    Properties:
      # Role name will be auto-generated by CloudFormation with stack name prefix
      # This ensures uniqueness and follows AWS naming best practices
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 
                - 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
                - {}
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${Organization}@${OwnerId}/${RepositoryName}@${RepositoryId}:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/aws-terraform-core-tf-access-${Environment}'
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/aws-terraform-core-ssm-read-${Environment}'
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/aws-terraform-core-s3-artifacts-access-${Environment}'
      Policies:
        - PolicyName: application-specific-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListEntitiesForPolicy
                  - iam:ListPolicies
                  - iam:ListPolicyTags
                  - iam:ListPolicyVersions
                  - iam:ListRoles
                  - iam:ListRolePolicies
                  - iam:ListRoleTags
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:UpdateRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/*'
              - Effect: Allow
                Action:
                  - iam:CreatePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicy
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                  - iam:TagPolicy
                  - iam:UntagPolicy
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/*'
              - Effect: Allow
                Action:
                  - kms:ListAliases
                  - kms:DescribeKey
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref RepositoryName
        - Key: Organization
          Value: !Ref Organization
        - Key: Environment
          Value: !Ref Environment
        - Key: RepositoryURL
          Value: !Sub 'https://github.com/${Organization}/${RepositoryName}'
        - Key: Automation
          Value: CloudFormation
        - Key: RepositoryPath
          Value: cloudformation/templates
        - Key: RepositoryFile
          Value: github-iam-role.yaml
        - Key: Description
          Value: !Sub 'IAM role for GitHub Actions in ${Organization}/${RepositoryName}'
        - Key: Region
          Value: !Ref 'AWS::Region'

Outputs:
  AccountAlias:
    Value: !Ref AccountAlias
  AwsId:
    Value:
      Fn::Join:
        - ''
        - - !FindInMap [EnvironmentMap, !Ref Environment, Upper]
          - '_ACCOUNT_ID = '
          - !Ref 'AWS::AccountId'
  RoleArn:
    Value:
      Fn::Join:
        - ''
        - - !FindInMap [EnvironmentMap, !Ref Environment, Upper]
          - '_ROLE_SECRET = '
          - Fn::Select:
              - 5
              - Fn::Split:
                  - "-"
                  - !GetAtt GHARole.Arn

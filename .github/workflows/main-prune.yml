# This triggers on all merged PRs into main

name: Main - Cleanup/Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  pull-requests: write
  contents: read
      
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev:
    name: "[DEV - ${{ matrix.environment_prefix }}]"
    strategy:
      matrix:
        environment_prefix: ${{ fromJSON(vars['ENVIRONMENT_PREFIXES_JSON'] || '[""]') }}
    uses: faccomichele/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'dev'
      region: 'us-east-1'
      global: true
      working-directory: '.'
      environment-prefix: ${{ matrix.environment_prefix }}
      action: 'destroy'
    secrets: inherit

  stg:
    name: "[STG - ${{ matrix.environment_prefix }}]"
    strategy:
      matrix:
        environment_prefix: ${{ fromJSON(vars['ENVIRONMENT_PREFIXES_JSON'] || '[""]') }}
    uses: faccomichele/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'stg'
      region: 'us-east-1'
      global: true
      working-directory: '.'
      environment-prefix: ${{ matrix.environment_prefix }}
      action: 'destroy'
    secrets: inherit

  prod:
    name: "[PROD - ${{ matrix.environment_prefix }}]"
    needs: [dev, stg]
    strategy:
      matrix:
        environment_prefix: ${{ fromJSON(vars['ENVIRONMENT_PREFIXES_JSON'] || '[""]') }}
    uses: faccomichele/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'prod'
      region: 'us-east-1'
      global: true
      working-directory: '.'
      environment-prefix: ${{ matrix.environment_prefix }}
      action: 'destroy'
    secrets: inherit
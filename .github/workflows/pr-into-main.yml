# This triggers on all PRs to validate the change using Terraform Plan

name: Pull Request - Validate

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
    
concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  pull-requests: write
  contents: read

jobs:
  dev:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: "[DEV - ${{ matrix.environment_prefix }}]"
    strategy:
      matrix:
        environment_prefix: ${{ fromJSON(vars['ENVIRONMENT_PREFIXES_JSON'] || '[""]') }}
    uses: faccomichele/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'dev'
      region: 'us-east-1'
      global: true
      working-directory: '.'
      environment-prefix: ${{ matrix.environment_prefix }}
      action: 'plan'
    secrets: inherit

  stg:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: "[STG - ${{ matrix.environment_prefix }}]"
    strategy:
      matrix:
        environment_prefix: ${{ fromJSON(vars['ENVIRONMENT_PREFIXES_JSON'] || '[""]') }}
    uses: faccomichele/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'stg'
      region: 'us-east-1'
      global: true
      working-directory: '.'
      environment-prefix: ${{ matrix.environment_prefix }}
      action: 'plan'
    secrets: inherit

  prod:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: "[PROD - ${{ matrix.environment_prefix }}]"
    needs: [dev, stg]
    strategy:
      matrix:
        environment_prefix: ${{ fromJSON(vars['ENVIRONMENT_PREFIXES_JSON'] || '[""]') }}
    uses: faccomichele/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'prod'
      region: 'us-east-1'
      global: true
      working-directory: '.'
      environment-prefix: ${{ matrix.environment_prefix }}
      action: 'plan'
    secrets: inherit